<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CRUD de Tarefas</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand">✅ Gerenciador de Tarefas</span>
  </div>
</nav>

<div class="container" style="max-width: 640px;">

  <div class="card mb-4">
    <div class="card-header bg-dark text-white">Nova Tarefa</div>
    <div class="card-body">
      <form id="form-tarefa" class="d-flex gap-2">
        <input id="input-descricao" type="text" class="form-control"
          placeholder="Descrição da tarefa..." required/>
        <button type="submit" class="btn btn-dark">Adicionar</button>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-header">Lista de Tarefas</div>
    <ul id="lista-tarefas" class="list-group list-group-flush"></ul>
  </div>

</div>

<script type="module" src="./main.mjs"></script>
</body>
</html>
